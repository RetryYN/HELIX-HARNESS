# harness-check — UT-TDD 利用者チーム repo に配備する CI (要件 §6.9)。
# Phase 0-A では Required 化しない / Phase 0-B で Required Status Checks に登録 (§6.5)。
# typecheck + 全回帰を push/PR (main) で実行。biome lint / branch-type matrix は段階追加。
name: harness-check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  harness-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: HELIX setup dry-run
        run: bun run ut-tdd setup project --dry-run --json
      - name: HELIX status
        run: bun run ut-tdd status --json
      - name: HELIX consumer doctor
        run: bun run ut-tdd doctor --profile consumer --json
      - name: Handover route
        run: bun run ut-tdd handover status --json
      - name: typecheck
        run: bun run typecheck
      - name: test
        run: bun run test
