schema_version: review-checklist.v1
name: review-checklist
skill_type: quality-gate-review
applies_to:
  layers:
    - L0
    - L1
    - L2
    - L3
    - L4
    - L5
    - L6
    - L7
    - L8
    - L9
    - L10
    - L11
    - L12
    - L13
    - L14
  drive_models:
    - Forward
    - Discovery
    - Scrum
    - Reverse
    - Recovery
    - Incident
    - Refactor
    - Retrofit
    - Add-feature
    - Research
description: Single-runtime judgment-gate review evidence。各項目は pass/fail/n-a と n-a の evidence を必須とする。
items:
  - id: DOC
    label: ドキュメント整合性
    status: pass
    evidence: 確認したドキュメント参照に置き換える。
  - id: TST
    label: テスト被覆と green 結果
    status: pass
    evidence: 実行したテスト command と結果に置き換える。
  - id: COD
    label: コードの正しさと保守性
    status: pass
    evidence: review した source 参照に置き換える。
  - id: XR
    label: cross-runtime 挙動
    status: pass
    evidence: Claude/Codex mode evidence に置き換える。
  - id: DEP
    label: 依存と境界への影響
    status: pass
    evidence: dependency/boundary check evidence に置き換える。
  - id: DUP
    label: 重複実装の回避
    status: pass
    evidence: reuse/search evidence に置き換える。
  - id: MOD
    label: module と workflow の整合性
    status: pass
    evidence: module/workflow consistency evidence に置き換える。
