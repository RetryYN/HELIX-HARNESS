  - CRLF and CR to LF
  - parse Markdown markers through CommonMark AST
  - collapse inline whitespace
  - trim boundaries
  - preserve Japanese punctuation
pointer_profiles:
  json_yaml:
    standard: RFC6901
    array_index: zero_based
    escape: ["~ to ~0", "/ to ~1"]
  markdown:
    standard: commonmark-logical-pointer-v1
    heading: /md/section/{level}-{heading_digest12}-{occurrence}
    node: /node/{type}/{ordinal}
    table_row: /table/{ordinal}/row/{one_based_data_row}
    code_line: /code_block/{ordinal}/line/{ordinal}
profiles:
  questions:
