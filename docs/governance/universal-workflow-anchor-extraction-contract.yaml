    rule: object with properties or named object property; exclude unconstrained array item object
    expected: 21
  fixtures:
    UWR-E-008: transitions, loops, terminals selectors; expected 5
    UWR-E-009: switching, candidates, routing, destinations, resource pools, allocation policies; expected 8
  normative_rules:
    mode: entry_specific_commonmark_selector
    entries:
      UWR-E-001: 26
      UWR-E-002: 63
      UWR-E-010: 47
      UWR-E-012: 12
      UWR-E-013: 54
      UWR-E-014: 16
