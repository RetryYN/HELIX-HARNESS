invariants:
  - archive and all entry digests match manifest
  - anchor IDs are unique and total 328
  - kind and entry counts equal expected values
  - every pointer resolves exactly once
  - raw and normalized digests recompute exactly
  - primary spans do not overlap unless an explicit relation permits it
  - every anchor has exactly one primary route
  - aliases, containers, and fixtures have coverage weight zero
  - pending, orphan, and unjustified reject counts are zero before freeze
  - two extractions are byte-identical excluding timestamp
  - source modification creates a new anchor ID and explicit lineage
  - 76 question IDs and question anchors form an exact bijection
  - compound conditional family IDs use hyphenated canonical output; underscore IDs are input-only aliases until the activation-bound expiry receipt
  - question ID migration has collision zero, orphan zero, and all consumer edges retargeted before activation
  - unresolved conflict groups C-UWR-01 through C-UWR-05 cannot be verified
