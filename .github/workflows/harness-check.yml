# harness-check — HELIX-HARNESS CI (要件定義書 §6.2/§6.9)
#
# §6.9: ローカル hook は早期検知のみ。全量テスト・回帰確認は GitHub Actions で実行する。
# §6.2: Branch Protection の Required Status Checks は本 `harness-check` 1 本のみ (集約 gate)。
#
# 本 workflow は §6.5 Phase 0-A 相当 (配備するが Required 化はしない / solo)。
# トリガは §6.9 の `pull_request: [main]` に加え、solo main 直開発を即 dogfood するため `push: [main]` も含める。
#
# subjob は本 job 内 step として集約する。Required Status Checks は `harness-check` 1 本だけにする。
name: harness-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: harness-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-durability-smoke:
    runs-on: windows-latest
    timeout-minutes: 8
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15"
          cache: npm

      - name: install deps (frozen)
        run: npm ci

      - name: Windows durability smoke
        run: npm run test:fast -- tests/loop-store-durability.test.ts tests/loop-store-durability-node.test.ts

  harness-check:
    needs: windows-durability-smoke
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: require Windows durability smoke
        if: ${{ needs.windows-durability-smoke.result != 'success' }}
        run: exit 1

      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15"
          cache: npm

      - name: install deps (frozen)
        run: npm ci

      - name: branch type matrix
        env:
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          branch="${HEAD_BRANCH}"
          kind="${branch%%/*}"
          case "$kind" in
            feature|design|research|poc|reverse|add|hotfix|refactor|docs|chore)
              ;;
            *)
              kind="none"
              ;;
          esac
          echo "branch=${branch}" >> "$GITHUB_STEP_SUMMARY"
          echo "kind=${kind}" >> "$GITHUB_STEP_SUMMARY"
          for subjob in plan-lint vmodel-lint branch-kind-check scrum-reverse-lint poc-no-merge-guard hotfix-postmortem-required commitlint regression-test; do
            status="skipped"
            case "$subjob:$kind" in
              plan-lint:feature|plan-lint:design|plan-lint:research|plan-lint:poc|plan-lint:reverse|plan-lint:add|plan-lint:hotfix|plan-lint:refactor) status="applicable" ;;
              vmodel-lint:feature|vmodel-lint:design|vmodel-lint:add|vmodel-lint:refactor) status="applicable" ;;
              branch-kind-check:feature|branch-kind-check:design|branch-kind-check:research|branch-kind-check:poc|branch-kind-check:reverse|branch-kind-check:add|branch-kind-check:hotfix|branch-kind-check:refactor) status="applicable" ;;
              scrum-reverse-lint:poc|scrum-reverse-lint:reverse) status="applicable" ;;
              poc-no-merge-guard:poc) status="applicable" ;;
              hotfix-postmortem-required:hotfix) status="applicable" ;;
              commitlint:feature|commitlint:design|commitlint:research|commitlint:poc|commitlint:reverse|commitlint:add|commitlint:hotfix|commitlint:refactor|commitlint:docs|commitlint:chore) status="applicable" ;;
              regression-test:feature|regression-test:add|regression-test:hotfix|regression-test:refactor) status="applicable" ;;
            esac
            echo "- ${subjob}: ${status}" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: branch-kind-check
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            range="${HEAD_SHA}^..${HEAD_SHA}"
          else
            range="${BEFORE_SHA}..${HEAD_SHA}"
          fi
          args=(guard branch-kind --branch "$HEAD_BRANCH" --strict-unknown-prefix)
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            args+=(--changed "$path")
          done < <(git diff --name-only "$range")
          npx --no-install tsx src/cli.ts "${args[@]}"

      - name: commitlint
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            range="${HEAD_SHA}^..${HEAD_SHA}"
          else
            range="${BEFORE_SHA}..${HEAD_SHA}"
          fi
          npx --no-install tsx src/cli.ts guard commitlint --range "$range"

      - name: poc-no-merge-guard
        if: ${{ github.event_name == 'pull_request' && startsWith(github.head_ref, 'poc/') && github.base_ref == 'main' }}
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: npx --no-install tsx src/cli.ts guard pr-context

      - name: hotfix-postmortem-required
        if: ${{ github.event_name == 'pull_request' && startsWith(github.head_ref, 'hotfix/') && github.base_ref == 'main' }}
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: npx --no-install tsx src/cli.ts guard pr-context

      - name: plan-lint
        run: npx --no-install tsx src/cli.ts plan lint --gate governance

      - name: L1-L12 canonical authority drift gate
        # Authority判定をtarget runtimeのNodeで実行する。
        run: npx --no-install vitest run --project fast tests/l12-canonical-authority.test.ts tests/l12-hybrid-recognition.test.ts tests/l3-progression-authority.test.ts tests/canonical-reuse-authority.test.ts tests/runtime-authority-requirements.test.ts tests/frontmatter.test.ts tests/schema.test.ts

      - name: typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: db rebuild (deterministic projection)
        run: npx --no-install tsx src/cli.ts db rebuild --json

      - name: test — 全回帰 (vitest run)
        timeout-minutes: 15
        run: npm test

      - name: lint (biome)
        run: npm run lint

      # Full regression tests exercise projection writers. Rebuild from source immediately before
      # doctor so the hard gate compares two views of the same post-test deterministic snapshot.
      - name: db rebuild (post-test projection refresh)
        run: npx --no-install tsx src/cli.ts db rebuild --json

      - name: doctor (governance hard gates)
        run: npx --no-install tsx src/cli.ts doctor
